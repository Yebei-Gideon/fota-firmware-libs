name: ESP32 CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: esp32-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ESP32 Targets
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env:
          - esp32dev
          - esp32s3
          - esp32c3
          - esp32s2

    defaults:
      run:
        working-directory: ESP/ESP32

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e ${{ matrix.env }}
