; PlatformIO configuration for FOTA-Client-ESP32 library
; ─────────────────────────────────────────────────────────
; Supported targets:
;   esp32dev   — generic ESP32 (WROOM/WROVER/D4) — DEFAULT
;   esp32s3    — ESP32-S3 DevKitC-1
;   esp32c3    — ESP32-C3 DevKitM-1
;   esp32s2    — ESP32-S2 Saola-1
;   native_test— host-based Unity unit tests (no hardware)
;
; Usage:
;   pio run -e esp32dev -t upload    # build + flash
;   pio device monitor               # serial monitor
;   pio test -e native_test          # run host tests

[platformio]
; src_dir points to the default (v1) sketch; the pre_src_override.py script
; remaps this per firmware_vN environment at build time.
src_dir = examples/FirmwareV1
; Tell PIO where the library itself lives (current directory)
lib_dir = .

; ── Common settings (inherited by every env) ─────────────
[env]
platform  = espressif32
framework = arduino

; Library dependencies
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0


; Treat src/ as a library source directory (not a standalone sketch)
lib_extra_dirs = .

; arduino-esp32 3.x uses ESP-IDF 5.x + mbedTLS 3.x
; Required for MBEDTLS_PK_ED25519 and esp_https_ota APIs used by this library
; platform_packages =
;     framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git
; platform_packages =
;     framework-arduinoespressif32 @ 3.3.7
; Force use of the manually cloned global folder
; platform_packages =
;     ; Your manual clone
;     framework-arduinoespressif32 @ file:///home/james/.platformio/packages/framework-arduinoespressif32
;     ; The required pre-compiled binary package
;     framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.3.7/esp32-core-3.3.7-libs.tar.xz
;     ; REQUIRED: Modern GCC 12.2.0 toolchain
;     toolchain-xtensa-esp32s3 @ 12.2.0+20230208
;     ; REQUIRED: Modern esptool
;     ; tool-esptoolpy @ ~1.40501.0
;     platformio/tool-esptoolpy@~1.40801.0


; platform_packages =
;     framework-arduinoespressif32 @ 3.20017.241212+sha.dcc1105b

; Common compiler flags for all environments
build_flags =
    -include
    -std=gnu++17
    -O0
    -g
    -ggdb
    -Wall
    -Wextra
    -Wno-unused-parameter
    -DCORE_DEBUG_LEVEL=3
    -DFOTA_LOG_LEVEL=3

; Serial port filters — pretty-print panics and back-traces automatically
monitor_filters =
    esp32_exception_decoder

; ── ESP32 (WROOM / WROVER / generic Xtensa LX6) ──────────
[env:esp32dev]
board        = esp32dev
upload_speed = 921600
monitor_speed = 115200

; ── ESP32-S3 (Xtensa LX7, built-in USB) ──────────────────
[env:esp32s3]
board        = esp32-s3-devkitc-1
upload_speed = 921600
monitor_speed = 115200

; ── ESP32-C3 (RISC-V, ultra-low-power) ───────────────────
[env:esp32c3]
board        = esp32-c3-devkitm-1
upload_speed = 921600
monitor_speed = 115200
upload_protocol = esptool

; ── ESP32-S2 (Xtensa LX7, USB OTG, single-core) ─────────
[env:esp32s2]
board         = esp32s2saola1
upload_speed  = 921600
monitor_speed = 115200
upload_protocol = esp-builtin

; ── ESP32-C6 (RISC-V, Wi-Fi 6 + BLE 5) ──────────────────
[env:esp32c6]
board         = esp32-c6-devkitc-1
upload_speed  = 921600
monitor_speed = 115200
upload_protocol = esptool

; ── ESP32-H2 (RISC-V, IEEE 802.15.4 / Thread / Zigbee) ──
; Note: no Wi-Fi — requires an external IP gateway for HTTP OTA.
; FOTA_MAX_FIRMWARE_SIZE reduced to 2 MiB (1 MB flash is common).
[env:esp32h2]
board         = esp32h2-devkitm-1
upload_speed  = 921600
monitor_speed = 115200
upload_protocol = esptool
build_flags =
    ${env.build_flags}
    -DFOTA_MAX_FIRMWARE_SIZE=(2*1024*1024)

; ── ESP32-C2 (RISC-V, ultra-budget, 272 KB RAM) ──────────
; Tight heap: chunk buffer is only 4 KB but mbedTLS needs ~20 KB for TLS.
; Keep FOTA_MAX_FIRMWARE_SIZE at ≤2 MiB; consider FOTA_USE_SD_TEMP=1
; if your board has an SD card to avoid any heap pressure.
[env:esp32c2]
board         = esp8684-devkitm-1
upload_speed  = 921600
monitor_speed = 115200
upload_protocol = esptool
build_flags =
    ${env.build_flags}
    -DFOTA_MAX_FIRMWARE_SIZE=(2*1024*1024)

; ── OTA upgrade-chain test binaries (v1 → v2 → v3 → v4 → v5) ────────────────
;
; Workflow:
;   1. Flash firmware_v1 to the device (starts at v1.0.0)
;   2. Build firmware_v2, upload .bin to FOTA dashboard as v2.0.0
;   3. Create a campaign → device OTA-updates to v2.0.0 and reboots
;   4. Repeat for v3, v4, v5
;
; All test binaries use ESP32-S3 DevKitC-1 with USB-CDC and disable
; signature verification (-DFOTA_VERIFY_SIGNATURE=0) for speed.

[env:firmware_v1]
board           = esp32-s3-devkitc-1
upload_speed    = 921600
monitor_speed   = 115200
upload_protocol = esp-builtin
extra_scripts   = pre:pre_src_override.py
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DFOTA_CURRENT_VERSION=\"1.0.0\"
    ; -DFOTA_VERIFY_SIGNATURE=0    ; ensure library compiles with signature checks disabled
    ; -DFOTA_AUTO_FETCH_PUBLIC_KEY=0
    ; Library configuration (version, auth token, verify, etc.) lives in
    ; examples/FirmwareV1/FotaUserConfig.h — no further overrides required.

[env:firmware_v2]
board           = esp32-s3-devkitc-1
upload_speed    = 921600
monitor_speed   = 115200
upload_protocol = esp-builtin
extra_scripts   = pre:pre_src_override.py
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DFOTA_CURRENT_VERSION=\"2.0.0\"
    ; Library configuration lives in examples/FirmwareV2/FotaUserConfig.h

[env:firmware_v3]
board           = esp32-s3-devkitc-1
upload_speed    = 921600
monitor_speed   = 115200
upload_protocol = esp-builtin
extra_scripts   = pre:pre_src_override.py
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DFOTA_CURRENT_VERSION=\"3.0.0\"
    ; Library configuration lives in examples/FirmwareV3/FotaUserConfig.h

[env:firmware_v4]
board           = esp32-s3-devkitc-1
upload_speed    = 921600
monitor_speed   = 115200
upload_protocol = esp-builtin
extra_scripts   = pre:pre_src_override.py
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DFOTA_CURRENT_VERSION=\"4.0.0\"
    ; Library configuration lives in examples/FirmwareV4/FotaUserConfig.h

[env:firmware_v5]
board           = esp32-s3-devkitc-1
upload_speed    = 921600
monitor_speed   = 115200
upload_protocol = esp-builtin
extra_scripts   = pre:pre_src_override.py
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DFOTA_CURRENT_VERSION=\"5.0.0\"
    ; Library configuration lives in examples/FirmwareV5/FotaUserConfig.h
